<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNUP PAGE</title>
    <link rel="stylesheet" href="./Signup.css">
</head>
<body>
    <div class="outter">
        <div class="left">
            <img src="https://www.shutterstock.com/image-illustration/new-user-online-registration-sign-260nw-2174740031.jpg" alt="sign up img">
        </div>
        <div class="right">
               <h2>signup page</h2> 
               <form action="Signup" method="post">
                <label for="mail">enter email</label>
                <input type="email"  placeholder="enter ur email" name="email">
                <label for="pass">enter password</label>
                <input type="text"  placeholder="enter password" name="password">
                <label for="re-pass">re-enter password</label>
                <input type="text"  placeholder="Re - enter password" name="re-password">
                <button type="submit">sign up</button>
               </form>
               <div class="in">
                    <p>already have an account?</p>
                    <a href="./Login.html">LOGIN</a>
               </div>
        </div>
    </div>
    
</body>
</html>
